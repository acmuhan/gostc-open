name: Web and Server Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'web/**'
      - 'server/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    paths:
      - 'web/**'
      - 'server/**'
      - '.github/workflows/frontend.yml'

permissions:
  contents: read

jobs:
  build:
    name: Build web and server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./web
        run: npm ci

      - name: Build frontend
        working-directory: ./web
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          if-no-files-found: error

      - name: Package frontend for server embed
        working-directory: ./web
        run: zip -r dist.zip dist

      - name: Copy frontend package into server
        run: |
          mkdir -p server/web
          mv web/dist.zip server/web/

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: server/go.sum

      - name: Verify backend formatting
        working-directory: ./server
        run: test -z "$(gofmt -l .)"

      - name: Build backend packages
        working-directory: ./server
        run: go build ./...

      - name: Build backend release
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --snapshot --clean --timeout 300m --parallelism=2
          workdir: ./server

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify server Docker image build
        uses: docker/build-push-action@v6
        with:
          context: ./server
          platforms: linux/amd64,linux/arm64
          push: false
          tags: gostc-open-server:ci

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-dist
          path: |
            server/dist/*.tar.gz
            server/dist/*.zip
          if-no-files-found: error
